name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # test_skillopt_spike is a long-running integration spike, not a unit
      # suite — excluded here, run it locally when touching the trainer.
      - name: Run test suite
        run: python -m pytest tests/ -q --ignore=tests/test_skillopt_spike.py

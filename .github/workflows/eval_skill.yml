name: Skill Eval Gate

on:
  pull_request:
    paths:
      - 'skills/**'

# the eval job posts its verdict as a PR comment; the default token is read-only
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect changed skill
        id: skill
        run: echo "skill=$(python .github/scripts/detect_skill.py)" >> $GITHUB_OUTPUT

      - name: Validate skill format
        if: steps.skill.outputs.skill != ''
        run: |
          SKILL="${{ steps.skill.outputs.skill }}"
          python -c "
          import pathlib, sys
          skill_file = pathlib.Path('$SKILL') / 'SKILL.md'
          if not skill_file.exists():
              print(f'ERROR: {skill_file} not found')
              sys.exit(1)
          content = skill_file.read_text()
          required = ['# ', '## When to Use', '## Workflow']
          missing = [r for r in required if r not in content]
          if missing:
              print(f'SKILL.md missing sections: {missing}')
              sys.exit(1)
          print('Skill format valid')
          "

      - name: Check MCP tool scope
        if: steps.skill.outputs.skill != ''
        run: |
          python -c "
          import json, pathlib, re, sys
          approved = json.loads(pathlib.Path('eval/security/approved_tools.json').read_text())
          skill_content = (pathlib.Path('${{ steps.skill.outputs.skill }}') / 'SKILL.md').read_text()
          all_approved = approved['approved_mcp_tools']
          tool_refs = re.findall(r'\b(search_\w+|check_\w+|get_\w+|create_\w+|modify_\w+|cancel_\w+|validate_\w+)\b', skill_content)
          unapproved = [t for t in set(tool_refs) if t not in all_approved]
          if unapproved:
              print(f'Unapproved MCP tool references: {unapproved}')
              sys.exit(1)
          print('MCP scope check passed')
          "

  eval:
    needs: security-scan
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
      LANGCHAIN_TRACING_V2: "false"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect changed skill
        id: skill
        run: echo "skill=$(python .github/scripts/detect_skill.py)" >> $GITHUB_OUTPUT

      - name: Skip if no skill changed
        if: steps.skill.outputs.skill == ''
        run: echo "No skill changed, skipping eval"

      - name: Start mock MCP server
        if: steps.skill.outputs.skill != ''
        run: |
          python eval/mock_mcp/server.py &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break
            sleep 1
          done
          curl -sf http://localhost:8000/health || { echo "mock MCP server failed to start"; exit 1; }

      - name: Run A/B eval
        if: steps.skill.outputs.skill != ''
        run: |
          # detect_skill prints e.g. skills/concrete/fare-rules;
          # ab_compare --skill wants the sub-path inside skills/ (concrete/fare-rules)
          SKILL_PATH="${{ steps.skill.outputs.skill }}"
          SKILL_REL="${SKILL_PATH#skills/}"
          python eval/ab_compare.py \
            --skill "${SKILL_REL}" \
            --trials 5 \
            --output ab_results.json

      - name: Gate check
        id: gate
        if: steps.skill.outputs.skill != ''
        run: python eval/gate_check.py --results ab_results.json
        continue-on-error: true

      - name: Post PR comment
        if: always() && steps.skill.outputs.skill != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Skill Eval Results\n\n';
            try {
              // ab_compare writes a summary dict: weighted_delta, regression_rate,
              // verdict, flagged_tasks, regression_traces (same schema the skills
              // repo workflow consumes).
              const results = JSON.parse(fs.readFileSync('ab_results.json', 'utf8'));
              const delta = results.weighted_delta;
              const rate = results.regression_rate;
              const verdict = results.verdict ?? ('${{ steps.gate.outcome }}' === 'success' ? 'PASS' : 'BLOCK');
              const emoji = { PASS: '✅', WARN: '⚠️', SOFT_BLOCK: '🔶', BLOCK: '🚫' }[verdict] ?? '❓';

              body += `| Metric | Value |\n|--------|-------|\n`;
              body += `| Weighted delta | ${typeof delta === 'number' ? delta.toFixed(3) : delta} |\n`;
              body += `| Regression rate | ${typeof rate === 'number' ? (rate * 100).toFixed(1) + '%' : rate} |\n`;
              body += `| Verdict | ${emoji} **${verdict}** |\n\n`;

              const traces = Object.entries(results.regression_traces ?? {});
              if (traces.length > 0) {
                body += `**Regressed tasks:**\n`;
                for (const [taskId, url] of traces) {
                  body += url ? `- [\`${taskId}\`](${url})\n` : `- \`${taskId}\`\n`;
                }
              }
              if (verdict === 'BLOCK' || verdict === 'SOFT_BLOCK') {
                body += `\n> **Action required:** fix the regressions above before merging.\n`;
              }
            } catch (e) {
              body += `Could not parse results: ${e.message}`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

# eval/gate_thresholds.yaml
# Thresholds calibrated for N=3 trials (best-of-3 per condition).
# At N=1 these will generate noise-driven BLOCKs — always run with --trials 3+.
tier1:
  weighted_delta_min: -0.15        # hard block: skill consistently hurts
  critical_task_delta_min: -0.30   # booking/flight task regressed badly
  regression_rate_max: 0.50        # majority of tasks regressed

tier2:
  weighted_delta_min: -0.05        # soft block: slight overall regression
  heavy_task_delta_min: -0.20      # high-weight task regressed
  regression_rate_max: 0.35        # >1/3 of tasks regressed

tier3:
  small_regression_delta_min: -0.05  # warn: small regressions present

calibration_log:
  - date: "2026-06-03"
    false_positive_rate: null
    false_negative_rate: null
    changes: "initial thresholds"
  - date: "2026-06-04"
    changes: "loosened for N=3 trials; original thresholds were calibrated for N=5 and caused noise-driven BLOCKs at N=1"
